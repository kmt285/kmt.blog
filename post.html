<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYAW MIN TUN - Read Post</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .single-post-container { max-width: 800px; margin: 0 auto; padding: 4rem 20px; }
        .single-post-header { margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 2rem; text-align: center; }
        .single-post-title { font-size: 2.5rem; color: var(--text-main); margin-bottom: 1rem; }
        .single-post-meta { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .single-post-content { font-size: 1.1rem; line-height: 1.8; color: var(--text-main); margin-bottom: 3rem; }
        .single-post-content img { max-width: 100%; height: auto; border-radius: 4px; margin: 1.5rem 0; }
        .download-btn { display: inline-block; background-color: var(--accent-color); color: var(--primary-bg); padding: 0.8rem 1.5rem; text-decoration: none; border-radius: 4px; font-weight: 600; transition: opacity 0.2s; }
        .download-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">KYAW MIN TUN</a>
    </header>

    <main class="single-post-container" id="singlePostContainer">
        <p style="text-align: center; color: var(--text-muted);">Loading post...</p>
    </main>

    <footer>
        <p>&copy; 2026 KYAW MIN TUN. All rights reserved.</p>
    </footer>

    <script src="js/post.js"></script>
</body>
</html>
