<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYAW MIN TUN - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .admin-container { max-width: 800px; margin: 0 auto; padding: 2rem 20px; }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 4px; font-family: var(--font-family); outline: none; }
        .form-input:focus { border-color: var(--accent-color); }
        .btn-primary { background-color: var(--accent-color); color: var(--primary-bg); border: none; padding: 0.8rem 1.5rem; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .editor-container { 
        height: 400px; /* မူလ အမြင့် */
        min-height: 200px; /* အနည်းဆုံး ထားရှိမည့် အမြင့် */
        margin-bottom: 1.5rem; 
        border-bottom-left-radius: 4px; 
        border-bottom-right-radius: 4px; 
        resize: vertical; /* ဤနေရာက Content Box ကို အပေါ်/အောက် ဆွဲချဲ့ခွင့်ပေးပါသည် */
        overflow-y: auto; /* စာများလာလျှင် Scroll ပေါ်ရန် */
        background-color: #ffffff;
    }
    
    /* Toolbar ကို ပိုမိုလှပစေရန် */
    .ql-toolbar {
        background-color: #f8f9fa;
        border-top-left-radius: 4px;
        border-top-right-radius: 4px;
    }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 2rem; }
        .logout-btn { background: none; border: none; color: red; cursor: pointer; font-weight: 600; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .admin-table th, .admin-table td { padding: 0.8rem; border-bottom: 1px solid var(--border-color); text-align: left; }
    </style>
</head>
<body>

    <main class="admin-container" id="loginSection">
        <h2 style="text-align: center; margin-bottom: 2rem;">Admin Login</h2>
        <form id="loginForm">
            <div class="form-group"><label>Username</label><input type="text" id="username" class="form-input" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" class="form-input" required></div>
            <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
            <p id="loginError" style="color: red; margin-top: 1rem; text-align: center;"></p>
        </form>
    </main>

    <main class="admin-container hidden" id="dashboardSection">
        <div class="admin-header">
            <h2>Dashboard</h2>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <div style="margin-bottom: 3rem; border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 4px;">
            <h3>Create New Category</h3>
            <form id="categoryForm" style="margin-top: 1rem;">
                <div class="form-group"><input type="text" id="newCategoryName" class="form-input" placeholder="e.g. Software" required></div>
                <button type="submit" class="btn-primary">Add Category</button>
                <span id="catMessage" style="margin-left: 1rem; color: green;"></span>
            </form>
        </div>

        <div style="margin-bottom: 3rem; border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 4px;">
            <h3>Manage Categories</h3>
            <form id="categoryForm" style="margin-top: 1rem; display: flex; gap: 10px;">
                <input type="text" id="newCategoryName" class="form-input" placeholder="e.g. Software" required style="flex: 1;">
                <button type="submit" class="btn-primary">Add Category</button>
            </form>
            <span id="catMessage" style="color: green; display: block; margin-top: 10px;"></span>
            
            <h4 style="margin-top: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Existing Categories</h4>
            <ul id="categoryList" style="list-style: none; padding: 0; margin-top: 1rem;">
                </ul>
        </div>

        <div style="margin-bottom: 3rem; border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 4px;" id="createPostDiv">
            <h3>Publish New Post</h3>
            <form id="postForm" style="margin-top: 1rem;">
                <div class="form-group"><label>Post Title</label><input type="text" id="postTitle" class="form-input" required></div>
                <div class="form-group"><label>Category</label><select id="postCategory" class="form-input" required></select></div>
                <div class="form-group"><label>Content</label><div id="editor-container" class="editor-container"></div></div>
                <div class="form-group"><label>File Download URL</label><input type="url" id="fileUrl" class="form-input"></div>
                <button type="submit" class="btn-primary">Publish Post</button>
                <span id="postMessage" style="margin-left: 1rem; color: green;"></span>
            </form>
        </div>

        <div style="margin-bottom: 3rem; border: 2px solid var(--accent-color); padding: 1.5rem; border-radius: 4px;" class="hidden" id="editPostDiv">
            <h3 style="display: flex; justify-content: space-between;">Edit Post <button id="cancelEditBtn" style="color: red; background: none; border: none; cursor: pointer; font-weight: bold;">X Cancel</button></h3>
            <form id="editPostForm" style="margin-top: 1rem;">
                <input type="hidden" id="editPostId">
                <div class="form-group"><label>Post Title</label><input type="text" id="editPostTitle" class="form-input" required></div>
                <div class="form-group"><label>Category</label><select id="editPostCategory" class="form-input" required></select></div>
                <div class="form-group"><label>Content</label><div id="edit-editor-container" class="editor-container"></div></div>
                <div class="form-group"><label>File Download URL</label><input type="url" id="editFileUrl" class="form-input"></div>
                <button type="submit" class="btn-primary">Update Post</button>
                <span id="editPostMessage" style="margin-left: 1rem; color: green;"></span>
            </form>
        </div>

        <div style="border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 4px;">
            <h3>Manage Posts</h3>
            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead><tr><th>Title</th><th>Category</th><th style="text-align: right;">Actions</th></tr></thead>
                    <tbody id="adminPostList"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>
    <script src="https://unpkg.com/quill-html-edit-button@2.2.7/dist/quill.htmlEditButton.min.js"></script>
    <script src="js/admin.js?v=2.0"></script>
</body>
</html>
</body>
</html>
